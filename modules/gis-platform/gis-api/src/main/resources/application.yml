spring:
  kafka:
    bootstrap-servers: localhost:9092
    topic: file-upload-topic
    consumer:
      group-id: file-upload-consumer

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  # 核心：指定默认激活的环境（开发环境）
  profiles:
    active: dev

app:
  file:
    upload-path: /data/uploads
